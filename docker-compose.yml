services:
  postgres:
    image: postgres:15
    container_name: policy-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: policy_agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-policy_agent_password}
      POSTGRES_DB: policy_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - policy-agent-network
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: policy-agent-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://policy_agent:${POSTGRES_PASSWORD:-policy_agent_password}@postgres:5432/policy_agent
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=policy_agent
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-policy_agent_password}
      - POSTGRES_DB=policy_agent
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4}
      - SECRET_KEY=${SECRET_KEY:-change_me}
    depends_on:
      - postgres
    networks:
      - policy-agent-network
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend/
      dockerfile: Dockerfile
    container_name: policy-agent-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - policy-agent-network
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  sandbox:
    build:
      context: .
      dockerfile: sandbox.Dockerfile
    container_name: policy-agent-sandbox
    restart: no
    read_only: true
    tmpfs:
      - /tmp
      - /workspace
    user: "10001:10001"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - policy-agent-network
    ports:
      - "8001:8001"

networks:
  policy-agent-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"
    ipam:
      driver: default

volumes:
  postgres_data:
